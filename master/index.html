<script>
const WD=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const CAT_ICONS={hair:'✂️',nails:'💅',brows:'👁️',skin:'🌿',barber:'🪒',massage:'💆',other:'⭐'};
const STATUS_L={pending:'Ожидает',confirmed:'Подтверждено',done:'Завершено',cancelled:'Отменено'};
const STATUS_C={pending:'bd-wait',confirmed:'bd-conf',done:'bd-done',cancelled:'bd-canc'};

const ls={get:k=>{try{return JSON.parse(localStorage.getItem('zapmst_'+k))}catch{return null}},set:(k,v)=>{try{localStorage.setItem('zapmst_'+k,JSON.stringify(v))}catch{}},del:k=>localStorage.removeItem('zapmst_'+k)};

let FB=null;
window.addEventListener('fbReady',async()=>{if(window._fbReady&&window._FB){FB=window._FB;try{await FB.signInAnonymously(FB.auth);}catch{}}},{once:true});

async function fbGet(col,id){if(!FB)return null;try{const d=await FB.getDoc(FB.doc(FB.db,col,id));return d.exists()?{id:d.id,...d.data()}:null;}catch{return null;}}
async function fbSet(col,id,data){if(!FB)return;try{await FB.setDoc(FB.doc(FB.db,col,id),data,{merge:true});}catch(e){console.warn(e);}}
async function fbQuery(col,...conds){if(!FB)return[];try{const q=FB.query(FB.collection(FB.db,col),...conds.map(([f,op,v])=>FB.where(f,op,v)));const snap=await FB.getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}));}catch{return[];}}

// ── NOTIFICATIONS ──
async function writeNotif(recipientUid,recipientRole,text,type,bookingId=''){
  if(!FB||!recipientUid)return;
  try{
    const id='n_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    await FB.setDoc(FB.doc(FB.db,'notifications',id),{

window.addEventListener('DOMContentLoaded',async()=>{

async function boot(){
  if(!UID){showScreen('s-nouid');return;}
  LINK=await fbGet('user_links',UID);
  USER=await fbGet('users',UID);
  if(!USER){
    const tgU=tg.initDataUnsafe?.user;
    USER={uid:UID,tgId:String(tgU?.id||''),firstName:tgU?.first_name||'Мастер',name:tgU?.first_name||'Мастер',phone:LINK?.phone||'',role:'master',createdAt:new Date().toISOString()};
    await fbSet('users',UID,USER);
  }
  // Find salon where this master is listed
  const phone=USER.phone||LINK?.phone||'';
  await findMySalon(phone);
  startHeartbeat();
}

async function findMySalon(phone){
  // Look for salons where masters array contains this uid or phone
  const salons=await fbQuery('salons',['status','==','approved']);
  for(const s of salons){
    const mstDoc=await fbGet('salon_masters',s.id);
    const masters=mstDoc?.masters||[];
    const me=masters.find(m=>m.uid===UID||m.phone===phone||m.phone===phone.replace(/^\+/,''));
    if(me){BIZ=s;MY_MASTER=me;break;}
  }
  if(!BIZ){
    await checkInvites();
    showScreen('s-nosalón');
    return;
  }
  const svcDoc=await fbGet('salon_services',BIZ.id);
  SERVICES=svcDoc?.services||[];
  const _bkRaw=await fbQuery('bookings',['bizId','==',BIZ.id],['masterId','==',MY_MASTER.id]);
  BOOKINGS=_bkRaw; // keep all statuses
  g('mst-name').textContent=MY_MASTER.name||USER.firstName;
  g('mst-av').textContent=avLetter(MY_MASTER.name||USER.firstName);
  renderSched();
  startSync();
  showScreen('s-sched');
}

function startHeartbeat(){const send=()=>{if(UID)fbSet('users',UID,{webAppLastSeen:new Date().toISOString()});};send();setInterval(send,5000);}

function renderCalStrip(){

function selDateFn(ds){selDate=ds;renderCalStrip();renderSchedList();tg.HapticFeedback.impactOccurred('light');}
function renderSchedList(){
  const el=g('m-sched-list');if(!el)return;
  let bks;
  if(selStatusF==='pending'){
    bks=BOOKINGS.filter(b=>b.status==='pending').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    if(!bks.length){el.innerHTML=`<div class="empty"><div class="empty-ico">⏳</div><div class="empty-txt">Нет записей, ожидающих подтверждения</div></div>`;return;}
    el.innerHTML=bks.map(b=>apptCard(b)).join('');return;
  }

  if(!bks.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📆</div><div class="empty-txt">На ${selDate===todayStr()?'сегодня':fmDate(selDate)} записей нет</div><button class="btn btn-sm btn-ghost" style="margin-top:12px" onclick="openNewBooking()">+ Добавить запись</button></div>`;return;}
  // Show active first, then cancelled/done below divider
  const active=bks.filter(b=>b.status!=='cancelled'&&b.status!=='done');

function apptCard(b){

    <div class="appt-time"><div class="appt-t1">${b.time}</div><div class="appt-t2">${eh}:${emm}</div></div>
    <div class="appt-div"></div>
    <div class="appt-info">
      <div class="appt-client">${esc(b.clientName)}</div>
      <div class="appt-svc">${esc(b.serviceName)}</div>

        <span class="badge ${STATUS_C[b.status]||'bd-wait'}">${b.status==='pending'?'<span class="dot-p"></span>':''}${STATUS_L[b.status]||b.status}</span>

async function confirmBk(id){
  const bk=BOOKINGS.find(b=>b.id===id);
  const idx=BOOKINGS.findIndex(b=>b.id===id);
  if(idx>=0)BOOKINGS[idx].status='confirmed';
  await fbSet('bookings',id,{status:'confirmed'});
  if(bk){
    const svcInfo=`${esc(bk.serviceName)} · ${fmDate(bk.date)} ${bk.time}`;
    if(bk.clientUid)await writeNotif(bk.clientUid,'client',`✅ Ваша запись подтверждена мастером: ${svcInfo}`,'confirmed',id);
    if(bk.adminUid)await writeNotif(bk.adminUid,'admin',`✅ Мастер подтвердил запись: ${esc(bk.clientName)}, ${svcInfo}`,'confirmed',id);
  }
  closeModal('m-bkdetail');showToast('Запись подтверждена','s');
  renderFilters();renderSchedList();
}
async function doneBk(id){
  const bk=BOOKINGS.find(b=>b.id===id);
  const idx=BOOKINGS.findIndex(b=>b.id===id);
  if(idx>=0)BOOKINGS[idx].status='done';
  await fbSet('bookings',id,{status:'done'});
  if(bk?.clientUid)await writeNotif(bk.clientUid,'client',`🌟 Спасибо за визит! ${esc(bk.serviceName)} завершена. До встречи!`,'done',id);
  closeModal('m-bkdetail');showToast('Запись завершена','s');
  renderFilters();renderSchedList();
}
async function cancelBk(id){
  tg.showConfirm('Отменить запись? Клиент и администратор получат уведомление.',async yes=>{
    if(!yes)return;
    const bk=BOOKINGS.find(b=>b.id===id);
    const idx=BOOKINGS.findIndex(b=>b.id===id);
    if(idx>=0)BOOKINGS[idx].status='cancelled';
    await fbSet('bookings',id,{status:'cancelled',cancelledBy:'master'});
    if(bk){
      const svcInfo=`${esc(bk.serviceName)} · ${fmDate(bk.date)} ${bk.time}`;
      if(bk.clientUid)await writeNotif(bk.clientUid,'client',`❌ Запись отменена мастером: ${svcInfo}. Свяжитесь со студией.`,'cancelled',id);

    renderFilters();renderSchedList();
  });
}

function renderNbDate(){
  const today=new Date();let html=`<div class="cal-strip" id="nb-cal">`;

function nbSelDate(ds){nbData.date=ds;document.querySelectorAll('#nb-cal .cal-day').forEach(el=>el.classList.remove('on'));event.currentTarget.classList.add('on');}
async function renderNbTime(){
  g('nb-body').innerHTML=`<div class="spin-center"><div class="spinner"></div></div>`;
  const dur=nbData.service?.dur||60;
  let existing=[];
  try{const _ex=await fbQuery('bookings',['bizId','==',BIZ.id],['masterId','==',MY_MASTER.id],['date','==',nbData.date]);existing=_ex.filter(b=>b.status!=='cancelled');}catch{}
  const open=MY_MASTER.open||'09:00',close=MY_MASTER.close||'19:00';
  const slots=calcSlots(open,close,dur,existing);
  g('nb-body').innerHTML=`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${fmDate(nbData.date)}</div>
    <div class="time-grid">${slots.map(s=>`<div class="ts${s.busy?' busy':''}${nbData.time===s.time?' on':''}" onclick="nbSelTime('${s.time}')">${s.time}</div>`).join('')}</div>`;
}
function nbSelTime(t){nbData.time=t;nbStep=4;renderNb();}
function calcSlots(open,close,dur,existing){
  const step=MY_MASTER?.slotInterval||30;
  const[sh,sm]=open.split(':').map(Number);const[eh,em]=close.split(':').map(Number);
  let cur=sh*60+sm;const end=eh*60+em;const slots=[];
  while(cur+dur<=end){
    const h=String(Math.floor(cur/60)).padStart(2,'0');const m=String(cur%60).padStart(2,'0');const time=`${h}:${m}`;
    const busy=existing.some(b=>{const[bh,bm]=b.time.split(':').map(Number);const bs=bh*60+bm,be=bs+(b.dur||60);return cur<be&&cur+dur>bs;});
    slots.push({time,busy});cur+=step;
  }
  return slots;
}

  <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5">Если вы работаете в другом салоне, принятие этого приглашения автоматически переведёт вас в новый салон.</p>
  <button class="btn btn-acc" onclick="acceptInvite('${inv.id}')">✓ Принять приглашение</button>
  <button class="btn btn-out" style="margin-top:8px" onclick="rejectInvite('${inv.id}')">✕ Отклонить</button>
  <button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal('m-invite')">Позже</button>`;
  openModal('m-invite');
}
async function acceptInvite(id){
  const inv=await fbGet('master_invites',id);if(!inv)return;
  await fbSet('master_invites',id,{status:'accepted'});
  const mstDoc=await fbGet('salon_masters',inv.bizId);
  const masters=mstDoc?.masters||[];
  const newMaster={id:'m_'+UID,bizId:inv.bizId,uid:UID,phone:USER.phone||LINK?.phone||'',name:inv.name||USER.firstName,spec:inv.spec||'',open:inv.open||'09:00',close:inv.close||'19:00',workDays:inv.workDays||[1,2,3,4,5],slotInterval:inv.slotInterval||30,color:masters.length%6};
  masters.push(newMaster);
  await fbSet('salon_masters',inv.bizId,{masters});
  await fbSet('users',UID,{salonId:inv.bizId,role:'master'});
  closeModal('m-invite');
  showToast('Добро пожаловать в команду! 🎉','s');
  tg.HapticFeedback.impactOccurred('heavy');
  setTimeout(()=>location.reload(),1500);
}
async function rejectInvite(id){
  await fbSet('master_invites',id,{status:'rejected'});
  closeModal('m-invite');showToast('Приглашение отклонено');
  g('invite-list-screen').innerHTML='';
}

// ── PROFILE ──

  const salon=BIZ;
  const name=MY_MASTER?.name||USER?.firstName||'—';
  g('prof-body').innerHTML=`
    <div style="border-radius:var(--r);border:1px solid rgba(251,191,36,.2);padding:20px;margin-bottom:16px;display:flex;gap:16px;align-items:center;background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(192,132,252,.06))">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#111">${avLetter(name)}</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:3px">${esc(name)}</div>
        <div style="font-size:12px;color:var(--text2)">${esc(MY_MASTER?.spec||'Мастер')}</div>
        <div style="font-size:11px;color:var(--acc);font-weight:700;margin-top:4px">✂️ Мастер</div>
      </div>
    </div>
    ${salon?`<div style="background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Салон</div>
      <div style="font-size:15px;font-weight:700">${esc(salon.name)}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(salon.addr||'')}</div>
      <div style="font-size:12px;color:var(--text2)">Режим работы: ${esc(MY_MASTER?.open||'09:00')} – ${esc(MY_MASTER?.close||'19:00')}</div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      ${['today','week','month'].slice(0,2).map((p,i)=>{const bks=p==='today'?BOOKINGS.filter(b=>b.date===todayStr()):BOOKINGS;const done=bks.filter(b=>b.status==='done');const rev=done.reduce((s,b)=>s+Number(b.price),0);return `<div style="background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px"><div style="font-size:11px;color:var(--text2);margin-bottom:6px">${i===0?'Сегодня':'За всё время'}</div><div style="font-family:var(--mono);font-size:24px;font-weight:500">${done.length}</div><div style="font-size:11px;color:var(--acc);margin-top:2px">${i===0?'записей':'завершено'}</div></div>`;}).join('')}
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:24px">Zap is... · v1.0 · Master</div>`;
}
</script>
